name: Web Audit

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  audit:
    runs-on: ubuntu-latest
    
    # We continue on error so it acts as a non-blocking artifact
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Build Next.js
        run: npm run build

      - name: Run Web Audit
        run: npm run audit:web

      - name: Upload Audit Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-audit-reports
          path: reports/web-audit/latest/
          retention-days: 14
